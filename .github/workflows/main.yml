name: Build & Audit macOS DMG (universal2)

on:
  push:
    branches: []
  pull_request:
    branches: []
  workflow_dispatch:  # Allows manual triggering
    inputs:
      app_version:
        description: "Override app version (e.g., 1.2.3)"
        required: false
        type: string

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Determine runner arch
        id: arch
        run: |
          uname -a
          echo "arch=$(uname -m)" >> $GITHUB_OUTPUT

      - name: Download and install Python 3.11 universal2
        run: |
          curl -LO https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg
          sudo installer -pkg python-3.11.9-macos11.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -V
          echo "PYTHON_BIN=/Library/Frameworks/Python.framework/Versions/3.11/bin/python3" >> $GITHUB_ENV
          echo "/Library/Frameworks/Python.framework/Versions/3.11/bin" >> $GITHUB_PATH

      - name: Set APP_VERSION
        id: setver
        run: |
          set -e
          # Priority: workflow input > tag name (strip v) > repo variable > fallback
          INPUT_VER='${{ github.event.inputs.app_version }}'
          if [[ -n "$INPUT_VER" ]]; then
            VER="$INPUT_VER"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VTAG="${GITHUB_REF_NAME}"
            VER="${VTAG#v}"
          elif [[ -n "${{ vars.APP_VERSION }}" ]]; then
            VER='${{ vars.APP_VERSION }}'
          else
            # Use date+sha for CI builds
            VER="0.0.0+ci-$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "APP_VERSION=$VER" | tee -a "$GITHUB_ENV"
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Pre-build smoke test (imports)
        run: |
          "$PYTHON_BIN" -m pip install --upgrade pip
          "$PYTHON_BIN" -m pip install -r requirements.txt
          "$PYTHON_BIN" -c "import platform; import rumps; import Cocoa; import keyring; import pydexcom; print('OK', platform.platform(), platform.machine())"

      - name: Make build.sh executable
        run: chmod +x build.sh

      - name: Import signing certificates
        if: env.SKIP_SIGN != '1'
        env:
          P12_APP_BASE64: ${{ secrets.DEV_ID_APP_P12_BASE64 }}
          P12_DEV_ID_BASE64: ${{ secrets.MACOS_DEV_ID_P12_BASE64 }}
          P12_INSTALLER_BASE64: ${{ secrets.DEV_ID_INSTALLER_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEV_ID_PASSWORD }}
          P12_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -e
          if [[ -z "$P12_APP_BASE64" && -z "$P12_DEV_ID_BASE64" ]]; then
            echo "No signing cert secret; skipping import."; exit 0; fi
          KEYCHAIN="build.keychain"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          import_p12() {
            local b64="$1" name="$2"
            [[ -z "$b64" ]] && return 0
            echo "$b64" | base64 --decode > "$name.p12"
            security import "$name.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -A \
              || security import "$name.p12" -k "$KEYCHAIN" -P "$P12_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -A \
              || echo "Import failed for $name (wrong password?)"
            rm -f "$name.p12"
          }
          import_p12 "$P12_DEV_ID_BASE64" dev_id_cert
          import_p12 "$P12_APP_BASE64" app_cert
          import_p12 "$P12_INSTALLER_BASE64" installer_cert
          security list-keychains -s "$KEYCHAIN" $(security list-keychains | sed 's/\"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN" >/dev/null
          security find-identity -v -p codesigning

      - name: Build DMG (universal2)
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
          NOTARIZE_APP_SPECIFIC_PASSWORD: ${{ secrets.NOTARIZE_APP_SPECIFIC_PASSWORD }}
          PYTHON_BIN: ${{ env.PYTHON_BIN }}
          APP_VERSION: ${{ env.APP_VERSION }}
          USE_SANDBOX: 0
        run: ./build.sh

      - name: Verify built app architectures
        if: always()
        run: |
          bash ci/verify_app_universal.sh "dist/DexcomNavBarIcon.app"
        shell: bash

      - name: Cleanup temporary keychain
        if: always()
        run: |
          KEYCHAIN="build.keychain"
          security delete-keychain "$KEYCHAIN" || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: DexcomNavBarIcon-${{ matrix.os }}-${{ steps.arch.outputs.arch }}
          path: |
            DexcomNavBarIcon.dmg
            dist/DexcomNavBarIcon.app
